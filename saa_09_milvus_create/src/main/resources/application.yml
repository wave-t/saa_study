server:
  port: 8089
  servlet:
    encoding:
      charset: UTF-8
      force: true
      enabled: true
spring:
  application:
    name: milvus-demo
  ai:
    dashscope: #阿里百炼平台
      api-key: ${AI_DASHSCOPE_API_KEY}
      chat: #指定文本模型
        options:
          model: qwen3.7-max
      embedding: #指定向量化模型
        options:
          model: text-embedding-v4

# Milvus 配置
milvus:
  host: http://192.168.80.129:19530
  token: root:Milvus
  collection: demo_collection