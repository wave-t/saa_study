server:
  port: 8083
  servlet:
    encoding:
      enabled: true # 开启HTTP请求参数编码
      charset: UTF-8 # 大模型对话中文乱码处理
      force: true # 强制
spring:
  application:
    name: chatClient_demo
  ai: #这里只能配置一个大模型，多大模型的使用需要通过配置类注入
    dashscope:
      api-key: ${AI_DASHSCOPE_API_KEY} #大模型apikey
#      DashScopeApi 中默认配置了Url地址 和 模型 QWEN_PLUS ，不使用默认，可以自己配置。
#      base-url: https://dashscope.aliyuncs.com #大模型api地址 默认指定了地址，可以不用写
      chat:
        options:
          model: qwen3.7-max #大模型模型名称