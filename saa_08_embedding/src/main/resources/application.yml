server:
  port: 8088
  servlet:
    encoding:
      charset: UTF-8
      force: true
      enabled: true
spring:
  application:
    name: embedding
  ai:
    dashscope: #阿里百炼平台
      api-key: ${AI_DASHSCOPE_API_KEY}
      chat: #指定文本模型
        options:
          model: qwen3.7-max
      embedding: #指定向量化模型
        options:
          model: text-embedding-v4