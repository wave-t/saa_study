server:
  port: 8086
  servlet:
    encoding:
      charset: UTF-8 #解决大模型对话中文乱码问题
      force: true
      enabled: true
spring:
  application:
      name: chatMemory02
  ai:
    dashscope:
      api-key: ${AI_DASHSCOPE_API_KEY}
      chat:
        options:
          model: qwen3.7-max
    chat:
      memory: #自动记忆配置属性
        repository:
          jdbc:
            initialize-schema: always #自动创建memory存储的表结构
            platform: mariadb #告诉框架当前数据库类型 Mariadb/mysql
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://192.168.80.129:3306/saa-memory?serverTimezone=Asia/Shanghai&useUnicode=true&characterEncoding=utf-8
    username: root
    password: 123
    hikari: #指定每条JDBC连接都使用utf8mb4字符集 并指定utf8mb4_unicode_ci排序规则
      connection-init-sql: SET NAMES utf8mb4 COLLATE utf8mb4_unicode_ci;