server:
  port: 8010
  servlet:
    encoding:
      charset: UTF-8
      force: true
      enabled: true
spring:
  application:
    name: rag-demo
  ai:
    dashscope: #阿里百炼平台
      api-key: ${AI_DASHSCOPE_API_KEY}
      chat: #指定文本模型
        options:
          model: qwen3.7-max
      embedding: #指定向量化模型
        options:
          model: text-embedding-v4
    vectorstore: #指定向量数据库
      milvus: # 配置Milvus
        client:
          host: 192.168.80.129
          port: 19530
          token: root:Milvus
        database-name: default #数据库名称
        collection-name: ragDemo #集合名称 集合名不能用 -
        initialize-schema: true #初始化表结构
        embedding-dimension: 1024 #模型输出向量的维度
logging:
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n"